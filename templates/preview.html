{% extends "layout.html" %}
{% block title %}Preview - MC Host Guide CMS{% endblock %}
{% block content %}
<section class="page-heading">
  <div>
    <p class="eyebrow">Generated site</p>
    <h1>Preview</h1>
  </div>
  <a class="button primary" href="{{ url_for('preview_file') }}" target="_blank" rel="noreferrer">Open static site</a>
</section>
<section class="confirm-box">
  <p>The preview serves files from `docs/`, matching the GitHub Pages output folder.</p>
  <div class="form-actions">
    <a class="button" href="{{ url_for('build') }}">Rebuild docs</a>
    <a class="button" href="{{ url_for('preview_file', filename='directory.html') }}" target="_blank" rel="noreferrer">Directory</a>
    <a class="button" href="{{ url_for('preview_file', filename='methodology.html') }}" target="_blank" rel="noreferrer">Methodology</a>
  </div>
</section>
{% endblock %}
