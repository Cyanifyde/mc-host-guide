{% extends "layout.html" %}
{% block title %}Delete {{ host.name }} - MC Host Guide CMS{% endblock %}
{% block content %}
<section class="confirm-box">
  <p class="eyebrow">Delete host</p>
  <h1>{{ host.name }}</h1>
  <p>This removes the host from `data/hosts.json`. The generated public site will change after the next build.</p>
  <form method="post" class="form-actions">
    <button class="button danger" type="submit">Delete host</button>
    <a class="button" href="{{ url_for('edit_host', host_id=host.id) }}">Cancel</a>
  </form>
</section>
{% endblock %}
